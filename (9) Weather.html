<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>India Weather Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #38bdf8;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: var(--bg-gradient);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 2.5rem;
            margin: 0;
            background: linear-gradient(to right, #fff, #38bdf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            opacity: 0.6;
            letter-spacing: 1px;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1100px;
        }

        .weather-card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 25px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .weather-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            border-color: var(--accent);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .city-info h2 {
            margin: 0;
            font-size: 1.4rem;
        }

        .city-info span {
            font-size: 0.85rem;
            opacity: 0.5;
        }

        .temp-main {
            font-size: 3.5rem;
            font-weight: 700;
            margin: 15px 0;
            display: flex;
            align-items: center;
        }

        .condition {
            font-size: 1rem;
            color: var(--accent);
            font-weight: 600;
            margin-bottom: 20px;
        }

        .stats-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            border-top: 1px solid var(--glass-border);
            padding-top: 15px;
        }

        .stat-box span {
            display: block;
            font-size: 0.75rem;
            opacity: 0.5;
            margin-bottom: 4px;
        }

        .stat-box strong {
            font-size: 0.95rem;
        }

        /* Highlight Nagpur */
        .featured {
            border: 1px solid rgba(56, 189, 248, 0.4);
            background: rgba(56, 189, 248, 0.05);
        }

        .featured::before {
            content: "HOME";
            position: absolute;
            top: 15px;
            right: -25px;
            background: var(--accent);
            color: #000;
            font-size: 0.6rem;
            font-weight: 800;
            padding: 5px 30px;
            transform: rotate(45deg);
        }

        @media (max-width: 600px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>National Weather Radar</h1>
        <p>Live Updates Across India • April 2026</p>
    </header>

    <div class="dashboard-grid" id="weather-grid">
        </div>

    <script>
        const weatherData = [
            { city: "Nagpur", state: "Maharashtra", temp: 34, cond: "Clear Sky", hum: "32%", wind: "12 km/h", featured: true },
            { city: "Mumbai", state: "Maharashtra", temp: 31, cond: "Humid", hum: "78%", wind: "18 km/h" },
            { city: "New Delhi", state: "NCR", temp: 36, cond: "Haze", hum: "25%", wind: "10 km/h" },
            { city: "Bangalore", state: "Karnataka", temp: 28, cond: "Partly Cloudy", hum: "50%", wind: "15 km/h" },
            { city: "Chennai", state: "Tamil Nadu", temp: 33, cond: "Sunny", hum: "65%", wind: "20 km/h" },
            { city: "Kolkata", state: "West Bengal", temp: 35, cond: "Thunderstorm", hum: "70%", wind: "22 km/h" }
        ];

        const grid = document.getElementById('weather-grid');

        weatherData.forEach(data => {
            const card = document.createElement('div');
            card.className = `weather-card ${data.featured ? 'featured' : ''}`;
           
            card.innerHTML = `
                <div class="card-header">
                    <div class="city-info">
                        <h2>${data.city}</h2>
                        <span>${data.state}, India</span>
                    </div>
                </div>
                <div class="temp-main">${data.temp}°</div>
                <div class="condition">${data.cond}</div>
                <div class="stats-row">
                    <div class="stat-box">
                        <span>HUMIDITY</span>
                        <strong>${data.hum}</strong>
                    </div>
                    <div class="stat-box">
                        <span>WIND SPEED</span>
                        <strong>${data.wind}</strong>
                    </div>
                </div>
            `;
            grid.appendChild(card);
        });
    </script>
</body>
</html>
